<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <style>

        body{
            background-color:#e6fffd;
            font-family: Arial;
        }

        table{
            background-color:#f0feff;
            border-collapse: collapse;
        }

        h1{
            color:#143f46;
        }

        input, textarea, select{
            width:95%;
            padding:5px;
        }

        input[type="submit"]{
            width:120px;
            background-color:#143f46;
            color:white;
            border:none;
            padding:10px;
            cursor:pointer;
        }

    </style>
</head>

<body>

    <h1 align="center"><i>Student Registration Form</i></h1>

    <form id="RegForm" onsubmit="return validate()">

        <table border="1" cellpadding="8" cellspacing="2" align="center" width="500">

            <tr>
                <td><b>First Name</b></td>
                <td>
                    <input type="text" name="Name" placeholder="Enter first name">
                </td>
            </tr>

            <tr>
                <td><b>Last Name</b></td>
                <td>
                    <input type="text" placeholder="Enter last name">
                </td>
            </tr>

            <tr>
                <td><b>Age</b></td>
                <td>
                    <input type="number" placeholder="Enter age">
                </td>
            </tr>

            <tr>
                <td><b>Gender</b></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td><b>Email</b></td>
                <td>
                    <input type="email" name="EMail" placeholder="Enter email">
                </td>
            </tr>

            <tr>
                <td><b>Password</b></td>
                <td>
                    <input type="password" name="Password" placeholder="Enter password">
                </td>
            </tr>

            <tr>
                <td><b>Phone Number</b></td>
                <td>
                    <input type="tel" name="Telephone" placeholder="Enter phone number">
                </td>
            </tr>

            <tr>
                <td><b>Address</b></td>
                <td>
                    <textarea rows="4" cols="30"></textarea>
                </td>
            </tr>

            <tr>
                <td><b>City</b></td>
                <td>
                    <select>
                        <option>Select City</option>
                        <option>Ahmedabad</option>
                        <option>Surat</option>
                        <option>Vadodara</option>
                        <option>Rajkot</option>
                        <option>Mumbai</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><b>Pincode</b></td>
                <td>
                    <input type="text" placeholder="Enter pincode">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                </td>
            </tr>

        </table>

    </form>

    <script src="script.js"></script>

</body>
</html>
